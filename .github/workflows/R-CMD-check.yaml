# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
#
# Job hierarchy:
#   R-CMD-check    — hurtig smoke check på alle branches (--no-tests, error-on error)
#   R-CMD-check-gate — fuld check med tests + warning-gate (kun PRs→master + tags)
#   release-gate   — tarball build + --as-cran check + artifact audit (master-push, tags, manual)
name: R-CMD-check

on:
  push:
    branches: [master, develop]
    tags: ['v*']
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

permissions: read-all

jobs:
  # --- 1. Hurtig smoke check (alle pushes/PRs) ---
  R-CMD-check:
    runs-on: ubuntu-latest
    name: smoke (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.BFH_ASSETS_PAT || secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      PKG_SYSREQS: "FALSE"
      CI_SKIP_SHINYTEST2: "true"
      GOOGLE_API_KEY: ""
      GEMINI_API_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      # Pre-install system deps saa pak's sysreqs-handler skipper xtradeb PPA-add.
      # Pakker uden RSPM binary for Noble falder til source-kompilering og kræver dev headers.
      # PKG_SYSREQS=FALSE forhindrer auto-install, saa vi gør det manuelt her.
      # curl >= 7.1.0: libcurl4-openssl-dev + libssl-dev
      # fs >= 2.1.0: libuv1-dev + cmake
      # openssl + websocket: libssl-dev
      # xml2: libxml2-dev
      # chromium: workaround for HTTP 504 fra launchpad.net REST API. Se #436.
      - name: Pre-install system deps (source-pkg dev headers + chromium workaround)
        run: |
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libuv1-dev libxml2-dev cmake
          sudo apt-get install -y chromium-browser || sudo snap install chromium || true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      # Hurtig smoke: ingen tests, kun ERRORs blokerer.
      # Holder develop-pushes hurtige (< 5 min).
      # error-on: dobbelt-quoting '"value"' er R-udtryk evalueret af action
      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          error-on: '"error"'
          args: 'c("--no-manual", "--no-tests")'

  # --- 2. PR-gate: fuld check med tests + warning-gate ---
  R-CMD-check-gate:
    runs-on: ubuntu-latest
    name: gate (tests + warnings)
    if: >
      (github.event_name == 'pull_request' && github.base_ref == 'master') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))

    env:
      GITHUB_PAT: ${{ secrets.BFH_ASSETS_PAT || secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      PKG_SYSREQS: "FALSE"
      CI_SKIP_SHINYTEST2: "true"
      GOOGLE_API_KEY: ""
      GEMINI_API_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      # Pre-install system deps saa pak's sysreqs-handler skipper xtradeb PPA-add.
      # Pakker uden RSPM binary for Noble falder til source-kompilering og kræver dev headers.
      # PKG_SYSREQS=FALSE forhindrer auto-install, saa vi gør det manuelt her.
      # curl >= 7.1.0: libcurl4-openssl-dev + libssl-dev
      # fs >= 2.1.0: libuv1-dev + cmake
      # openssl + websocket: libssl-dev
      # xml2: libxml2-dev
      # chromium: workaround for HTTP 504 fra launchpad.net REST API. Se #436.
      - name: Pre-install system deps (source-pkg dev headers + chromium workaround)
        run: |
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libuv1-dev libxml2-dev cmake
          sudo apt-get install -y chromium-browser || sudo snap install chromium || true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      # Fuld gate: tests kører, WARNINGs blokerer.
      # Kræver at eksisterende WARNINGs er ryddet (se openspec/changes/
      # fix-dependency-namespace-guards + cleanup-package-artifacts).
      # error-on: dobbelt-quoting '"value"' er R-udtryk evalueret af action
      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          error-on: '"warning"'
          args: 'c("--no-manual")'

  # --- 3. Release-gate: tarball build + --as-cran check ---
  release-gate:
    runs-on: ubuntu-latest
    name: release-gate (tarball + as-cran)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))

    env:
      GITHUB_PAT: ${{ secrets.BFH_ASSETS_PAT || secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      PKG_SYSREQS: "FALSE"
      CI_SKIP_SHINYTEST2: "true"
      GOOGLE_API_KEY: ""
      GEMINI_API_KEY: ""
      _R_CHECK_CRAN_INCOMING_REMOTE_: false
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      # Pre-install system deps saa pak's sysreqs-handler skipper xtradeb PPA-add.
      # Pakker uden RSPM binary for Noble falder til source-kompilering og kræver dev headers.
      # PKG_SYSREQS=FALSE forhindrer auto-install, saa vi gør det manuelt her.
      # curl >= 7.1.0: libcurl4-openssl-dev + libssl-dev
      # fs >= 2.1.0: libuv1-dev + cmake
      # openssl + websocket: libssl-dev
      # xml2: libxml2-dev
      # chromium: workaround for HTTP 504 fra launchpad.net REST API. Se #436.
      - name: Pre-install system deps (source-pkg dev headers + chromium workaround)
        run: |
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libuv1-dev libxml2-dev cmake
          sudo apt-get install -y chromium-browser || sudo snap install chromium || true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Build tarball
        id: build
        run: |
          R CMD build --no-manual --no-build-vignettes .
          echo "tarball=$(ls biSPCharts_*.tar.gz | head -1)" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Check and audit tarball (--as-cran)
        env:
          TARBALL: ${{ steps.build.outputs.tarball }}
        run: |
          R CMD check --as-cran --no-manual --no-build-vignettes "$TARBALL"
          FORBIDDEN=$(tar -tzf "$TARBALL" | grep -E "(\.claude|\.worktrees|\.DS_Store|\.Rcheck|Rplots\.pdf|\.backup|/logs/|/rsconnect/)" || true)
          if [ -n "$FORBIDDEN" ]; then
            echo "ERROR: Forbidden artifacts in tarball:"
            echo "$FORBIDDEN"
            exit 1
          fi
          echo "Tarball audit: clean"
        shell: bash

      - name: Upload tarball check output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-check-output
          path: biSPCharts.Rcheck/
          if-no-files-found: ignore
