# Validerer at test-classification.yaml er konsistent med tests/testthat/
# og test-audit.json. Kaldes ved PR/push til master.
name: validate-manifest

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

permissions: read-all

jobs:
  validate-manifest:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install dependencies (yaml + jsonlite)
        run: |
          install.packages(c("yaml", "jsonlite"), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Validate test-classification.yaml
        run: |
          Rscript dev/classify_tests.R --validate
        shell: bash
