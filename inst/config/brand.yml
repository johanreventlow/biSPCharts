color:
  palette:
    # BFHtheme officielle hospitalsfarver
    primary: "#007dbb"        # BFHtheme hospital_primary (identitetsfarve)
    secondary: "#646c6f"      # BFHtheme hospital_grey
    success: "#4f8325"        # Region H success grøn
    warning: "#f9b928"        # Behold (ingen hospital-specifik)
    danger: "#dc202b"         # Region H danger rød
    info: "#009ce8"           # BFHtheme hospital_blue
    light: "#f8f8f8"          # Neutral lys
    dark: "#333333"           # BFHtheme hospital_dark_grey
    accent: "#FF6B35"         # Hospital orange accent (behold)

    hospitalblue: "#009ce8"   # BFHtheme hospital_blue
    darkgrey: "#333333"       # BFHtheme hospital_dark_grey
    lightgrey: "#ccd3dd"      # BFHtheme regionh_light_grey1
    mediumgrey: "#646c6f"     # BFHtheme hospital_grey
    regionhblue: "#002555"    # BFHtheme regionh_primary (navbar)
    ui_grey_light: "#ebebeb"  # BFHtheme ui_grey_light — baggrunde, subtle borders
    ui_grey_soft: "#b8b8b8"   # BFHtheme ui_grey_soft — disabled, dividers
    ui_grey_mid: "#8f8f8f"    # BFHtheme ui_grey_mid — knapper, ikoner normal
    ui_grey_dark: "#666666"   # BFHtheme ui_grey_dark — sekundær tekst, hover


typography:
  base: "Mari, Arial, Helvetica, sans-serif"
  headings:
    family: "Mari, Arial, Helvetica, sans-serif"
    weight: 700

# Theme bygges programmatisk i create_brand_theme() (config_branding_getters.R)
# baseret på color.palette værdierne ovenfor.
# Flatly preset bruges som base, med alle farver og navbar overskrevet.
